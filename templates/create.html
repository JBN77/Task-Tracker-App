{% extends "base.html" %} {% block content %}
<h2>Create New Item</h2>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" class="form-card">
  <label for="type">Item Type</label>
  <select name="type" id="type" onchange="toggleFields()">
    <option value="task">Task</option>
    <option value="habit">Habit</option>
    <option value="deadline">Deadline Task</option>
  </select>

  <label for="title">Title</label>
  <input type="text" name="title" id="title" required />

  <label for="description">Description</label>
  <textarea name="description" id="description"></textarea>

  <div id="priority-field">
    <label for="priority">Priority</label>
    <select name="priority" id="priority">
      <option value="Low">Low</option>
      <option value="Medium" selected>Medium</option>
      <option value="High">High</option>
    </select>
  </div>

  <div id="due-date-field" style="display: none">
    <label for="due_date">Due Date</label>
    <input type="date" name="due_date" id="due_date" />
  </div>

  <button type="submit" class="btn">Create Item</button>
</form>

<script>
  function toggleFields() {
    const type = document.getElementById("type").value;
    const priorityField = document.getElementById("priority-field");
    const dueDateField = document.getElementById("due-date-field");

    if (type === "task") {
      priorityField.style.display = "block";
      dueDateField.style.display = "none";
    } else if (type === "deadline") {
      priorityField.style.display = "none";
      dueDateField.style.display = "block";
    } else {
      priorityField.style.display = "none";
      dueDateField.style.display = "none";
    }
  }

  toggleFields();
</script>
{% endblock %}
